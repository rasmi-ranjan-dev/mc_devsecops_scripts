execution_mode: "parallel"
default_build_type : "incremental"
scans:
  - name: "Checkout"
    enabled: "ON"           # Always runs first
    sequential: True
    predecessors: []
    host: "172.18.228.115" # Host where the shell script lives and will execute
    # username: "e1854292"
    # password: "Welcomeuser@123"
    script: "/u01/nfs_shared_files/incr_checkout_shared.sh"
    # script: "/u01/CheckoutDataplus_Incr_9.0.0.sh"
    script_wrapper: "run_script.py" # LOCAL wrapper script to execute
    # Params map to keys in project.yaml
    params: ["project_name", "sourcepath", "vcs_version", "prop_file_path", "vcs_user", "vcs_pass"]

  - name: "Dependency-Check"
    enabled: "ON"
    predecessors: []
    host: "172.18.228.57"
    script: "run_dependency_check.py"
    params: ["project_name", "scanpath", "outputfolder","web_url","buildId","webhook_token"]

  - name: "Fortify SAST"
     enabled: "ONLY-IF"
     predecessors: ["Dependency-Check"]  # Run only if Dependency-Check succeeds
     host: "172.18.228.112"
     script: "run_fortify_sast.py"
     params: ["project_name", "source_path", "output_folder"]

  - name: "OSS"
    enabled: "ON"
    predecessors: [] # Run only if Fortify SAST succeeds
    host: "palamida@172.18.228.174"
    script: "run_oss_check.py"
    params: ["project_name", "scanpath", "outputfolder", "web_url","webhook_token"]
